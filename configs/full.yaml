# Full paper configuration. Inherits defaults; overrides only what changes.
# Reproduces Table 1 / Figs 2-4 of the manuscript on 4xA100 80GB.
defaults: default.yaml

experiment:
  name: fedloraguard_full
  output_dir: runs/full

# All other fields use the values pinned in default.yaml, which mirror the
# paper's Section 6.4 (Implementation) configuration:
#   N=50, m=10, q=0.2, T=100, S=1.0, sigma=1.1, eps_r=0.5, eps_T~5.0,
#   delta=1e-5, lr=5e-4, wd=1e-4, AdamW + cosine annealing.
